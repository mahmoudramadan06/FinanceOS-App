workflows:
  ios-html-app:
    name: Build iOS IPA
    max_build_duration: 30
    instance_type: mac_mini_m1
    scripts:
      - name: Install Pods and Build Real IPA
        script: |
          # 1. الدخول لمشروع الأيفون وتثبيت المكونات الرسمية داخل السيرفر
          cd ios/App
          pod install
          
          # 2. بناء حزمة الـ Xcode كاملة بنظام الـ Debug
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Debug CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build
          
          # 3. تجميع الـ Payload وضغط الـ .ipa الأصلي بمساحته الكاملة
          cd Build/Products/Debug-iphoneos
          mkdir -p Payload
          cp -R App.app Payload/
          zip -r $CM_BUILD_DIR/FinanceOS.ipa Payload
    artifacts:
      - $CM_BUILD_DIR/*.ipa