workflows:
  ios-html-app:
    name: Build iOS IPA
    max_build_duration: 30
    instance_type: mac_mini_m1
    scripts:
      - name: Install Dependencies and Sync Capacitor
        script: |
          # 1. تثبيت الجيجات والمكونات جوه السيرفر
          npm install
          npx cap sync ios
          
      - name: Capacitor Native Build iOS
        script: |
          # 2. أمر كاباسيتور الرسمي لبناء حزمة أيفون كاملة بدون تشفير أو توقيع
          npx cap build ios --no-open
          
      - name: Package IPA
        script: |
          # 3. تجميع الـ Payload والـ IPA من المجلد اللي كاباسيتور قفله أوتوماتيك
          cd ios/App/DerivedData/*
          cd Build/Products/Debug-iphoneos
          mkdir -p Payload
          cp -R App.app Payload/
          zip -r $CM_BUILD_DIR/FinanceOS.ipa Payload
    artifacts:
      - $CM_BUILD_DIR/*.ipa