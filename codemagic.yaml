workflows:
  ios-html-app:
    name: Build iOS IPA
    max_build_duration: 30
    instance_type: mac_mini_m1
    scripts:
      - name: Install Dependencies and Sync Capacitor
        script: |
          npm install
          npx cap sync ios
          
      - name: Build Xcode Project Clean
        script: |
          cd ios/App
          
          # بناء المشروع مع إجبار الـ Xcode على تجاهل التوقيع تماماً وبدون حساب مطور
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Debug \
                     -derivedDataPath build_output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_IDENTITY="" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     clean build
          
      - name: Package IPA
        script: |
          cd ios/App/build_output/Build/Products/Debug-iphoneos
          mkdir -p Payload
          cp -R App.app Payload/
          zip -r $CM_BUILD_DIR/FinanceOS.ipa Payload
    artifacts:
      - $CM_BUILD_DIR/*.ipa