workflows:
  ios-html-app:
    name: Build iOS IPA
    max_build_duration: 30
    instance_type: mac_mini_m1
    scripts:
      - name: Clean Pods Dependency and Build Real IPA
        script: |
          cd ios/App
          
          # 1. إجبار مشروع الـ Xcode على تجاهل ملفات الـ Pods المفقودة تماماً
          sed -i '' 's/Pods-App.debug.xcconfig//g' App.xcodeproj/project.pbxproj || true
          sed -i '' 's/Pods-App.release.xcconfig//g' App.xcodeproj/project.pbxproj || true
          
          # 2. البناء النظيف من غير ما الـ Xcode يدور على ملفات قديمة
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Debug \
                     -derivedDataPath build_output \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build
          
          # 3. تجميع الـ Payload والضغط
          cd build_output/Build/Products/Debug-iphoneos
          mkdir -p Payload
          cp -R App.app Payload/
          zip -r $CM_BUILD_DIR/FinanceOS.ipa Payload
    artifacts:
      - $CM_BUILD_DIR/*.ipa