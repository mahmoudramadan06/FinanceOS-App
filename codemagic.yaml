workflows:
  ios-html-app:
    name: Build iOS IPA
    max_build_duration: 30
    instance_type: mac_mini_m1
    scripts:
      - name: Build Pure iOS App from WWW
        script: |
          # 1. إنشاء هيكل أبلكيشن أيفون رسمي داخل السيرفر
          mkdir -p Payload/App.app
          
          # 2. نسخ ملفات الويب النضيفة بتاعتك جوة الأبلكيشن
          cp -R www/* Payload/App.app/
          
          # 3. ضغط الحزمة وتحويلها لـ IPA حقيقي بمساحته الكاملة
          zip -r $CM_BUILD_DIR/FinanceOS.ipa Payload
    artifacts:
      - $CM_BUILD_DIR/*.ipa