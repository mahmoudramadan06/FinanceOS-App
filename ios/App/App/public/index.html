<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance OS</title>
    <!-- تضمين مكتبة الرسوم البيانية -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --success: #4ade80;
            --danger: #f87171;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 15px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--accent); margin: 0; font-size: 24px; }
        
        /* كروت الإحصائيات */
        .balance-card {
            background: linear-gradient(135deg, #1e293b, #334155);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-box {
            background-color: var(--card-bg);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }
        
        /* النماذج والمدخلات */
        .form-group {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 15px;
        }
        h3 { margin-top: 0; color: var(--accent); font-size: 16px; }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: white;
            box-sizing: border-box;
        }
        button {
            background-color: var(--accent);
            color: #0f172a;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        
        /* الرسم البياني */
        .chart-container {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Finance OS 💰</h1>
        <p>إدارة مالية ذكية - أوفلاين</p>
    </div>

    <!-- لوحة الرصيد -->
    <div class="balance-card">
        <div>إجمالي الرصيد الحالي</div>
        <h2 id="total-balance" style="font-size: 32px; color: var(--success); margin: 10px 0;">0 ج.م</h2>
    </div>

    <!-- تفاصيل الخزائن -->
    <div class="stats-grid">
        <div class="stat-box">
            <span style="font-size: 12px; color: #94a3b8;">💵 الكاش</span>
            <div id="cash-val" style="font-weight: bold; margin-top: 5px;">0</div>
        </div>
        <div class="stat-box">
            <span style="font-size: 12px; color: #94a3b8;">💳 الفيزا</span>
            <div id="card-val" style="font-weight: bold; margin-top: 5px;">0</div>
        </div>
        <div class="stat-box" style="grid-column: span 2;">
            <span style="font-size: 12px; color: #94a3b8;">🐷 محوش كام (مدخرات)</span>
            <div id="savings-val" style="font-weight: bold; margin-top: 5px; color: var(--accent);">0</div>
        </div>
    </div>

    <!-- الرسم البياني -->
    <div class="chart-container">
        <h3>📊 توزيع أموالك</h3>
        <canvas id="financeChart"></canvas>
    </div>

    <!-- إضافة معاملة -->
    <div class="form-group">
        <h3>➕ إضافة حركة مالية</h3>
        <input type="number" id="amount" placeholder="المبلغ">
        <select id="type">
            <option value="cash">كاش</option>
            <option value="card">فيزا</option>
            <option value="savings">تحويش/ادخار</option>
        </select>
        <button onclick="addTransaction()">حفظ العملية</button>
    </div>

    <!-- نظام التنبيهات الذكي للمشتريات -->
    <div class="form-group">
        <h3>🎯 تذكير لشراء منتج (مع Cooldown)</h3>
        <input type="text" id="item-name" placeholder="اسم الحاجة اللي عايز تشتريها">
        <input type="number" id="cooldown-min" placeholder="مدة الـ Cooldown (بالدقائق)">
        <button onclick="setNotification()" style="background-color: #e2e8f0; color: #0f172a;">جدولة التنبيه</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
